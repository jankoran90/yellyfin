name: Create release

on:
  push:
    tags:
      - v*

defaults:
  run:
    shell: bash

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx8g -XX:MaxMetaspaceSize=512m'"
  TAG_NAME: ${{ github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ env.TAG_NAME }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')

          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: $PREV_TAG"

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          RELEASE_NOTES="## Changes in ${CURRENT_TAG}

          ${CHANGELOG}

          ---
          *Built from [Yellyfin](https://github.com/jankoran90/yellyfin)*"

          # Save to file for multiline output
          echo "$RELEASE_NOTES" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Build app
        id: buildapp
        env:
          KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
          KEY_STORE_PASSWORD: "${{ secrets.KEY_STORE_PASSWORD }}"
          SIGNING_KEY: "${{ secrets.SIGNING_KEY }}"
        run: |
          ./gradlew clean assembleDefaultRelease

      - name: Copy APK to short names
        run: |
          find app/build/outputs/apk -name '*.apk' -print0 |
            while IFS= read -r -d '' apk; do
              abi=$(echo "$apk" | grep -oE '(arm64-v8a|armeabi-v7a|universal)' || true)
              if [ -n "$abi" ]; then
                cp "$apk" "app/build/outputs/apk/Yellyfin-${abi}.apk"
              else
                cp "$apk" "app/build/outputs/apk/Yellyfin.apk"
              fi
            done

      - name: Checksums
        run: |
          echo "SHA256 checksums:"
          find app/build/outputs/apk -name '*.apk' -print0 | xargs -0 sha256sum

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar

          # Collect short-named APKs
          APKS=$(find app/build/outputs/apk -name 'Yellyfin*.apk')

          gh release create "${{ env.TAG_NAME }}" \
            --latest \
            --title "Yellyfin ${{ env.TAG_NAME }}" \
            --notes-file /tmp/release_notes.md \
            $APKS
